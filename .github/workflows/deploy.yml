name: Ubuntu (non-Nix) build check
on:
  push:
    branches:
      - main
  pull_request:
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.9"
      - name: Deploy
        run: make deploy
      - name: Verify symlinks exist (re-deploy should fail)
        run: "! make deploy"
      - name: Unlink
        run: make unlink
      - name: Verify unlink (deploy again should succeed)
        run: make deploy
