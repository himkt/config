name: Ubuntu (non-Nix) build check
on:
  push:
    branches:
      - main
  pull_request:
jobs:
  link:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.9"
      - name: Link
        run: make link
      - name: Verify symlinks exist (re-link should fail)
        run: "! make link"
      - name: Unlink
        run: make unlink
      - name: Verify unlink (link again should succeed)
        run: make link
